<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eksāmenu Kalendārs</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0B1120;--card:#131B2E;--card2:#1A2340;--brd:rgba(99,102,241,.15);--brd2:rgba(99,102,241,.4);--acc:#6366F1;--accl:#A5B4FC;--accg:rgba(99,102,241,.25);--txt:#E2E8F0;--dim:#94A3B8;--mut:#64748B;--red:#EF4444;--grn:#10B981;--warn:#F59E0B}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.hdr{background:linear-gradient(135deg,var(--card),var(--card2));border-bottom:1px solid var(--brd);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);flex-wrap:wrap;gap:8px}
.hdr h1{font-size:20px;font-weight:800;background:linear-gradient(135deg,#818CF8,#C084FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .ui{display:flex;align-items:center;gap:8px;font-size:13px;flex-wrap:wrap}
.badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:2px 7px;border-radius:5px;background:rgba(99,102,241,.2);color:var(--accl)}
.badge.sa{background:rgba(234,179,8,.2);color:#FDE047}
.badge.ga{background:rgba(16,185,129,.2);color:#6EE7B7}
.cnt{max-width:1100px;margin:0 auto;padding:20px 14px}
.btn{padding:7px 14px;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-p{background:linear-gradient(135deg,#6366F1,#7C3AED);color:#fff}
.btn-p:hover{filter:brightness(1.15)}
.btn-g{background:rgba(99,102,241,.12);color:var(--accl)}
.btn-g:hover{background:rgba(99,102,241,.25)}
.btn-d{background:rgba(239,68,68,.15);color:#F87171}
.btn-d:hover{background:#EF4444;color:#fff}
.btn-s{background:rgba(16,185,129,.15);color:#6EE7B7}
.btn-s:hover{background:#10B981;color:#fff}
.btn-w{background:rgba(245,158,11,.15);color:#FBBF24}
.btn-w:hover{background:#F59E0B;color:#000}
.btn-sm{padding:4px 8px;font-size:11px}
.btn-lo{background:rgba(148,163,184,.1);color:var(--dim)}
.btn-lo:hover{background:rgba(239,68,68,.2);color:#F87171}
.inp{width:100%;padding:9px 12px;border-radius:9px;font-size:13px;background:var(--bg);border:1px solid var(--brd);color:var(--txt);outline:none;transition:border .15s}
.inp:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--accg)}
.crd{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:16px;animation:fadeIn .4s ease;margin-bottom:14px}
.tabs{display:flex;gap:3px;margin-bottom:20px;background:var(--card);border-radius:10px;padding:3px;border:1px solid var(--brd)}
.tab{flex:1;padding:8px;text-align:center;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--dim);background:transparent;border:none}
.tab.on{background:var(--acc);color:#fff;box-shadow:0 3px 10px var(--accg)}
.tab:not(.on):hover{background:rgba(99,102,241,.1)}
.layout{display:flex;gap:16px;flex-wrap:wrap}
.side{flex:0 0 240px;min-width:180px}
.main{flex:1;min-width:0}
.gl{display:flex;flex-direction:column;gap:5px}
.gi{padding:9px 12px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center;transition:all .15s;border:1px solid transparent;background:var(--card2)}
.gi:hover{border-color:var(--brd2)}
.gi.on{background:rgba(99,102,241,.15);border-color:var(--acc);color:var(--accl)}
.gc{font-size:10px;background:rgba(99,102,241,.2);color:var(--accl);padding:2px 7px;border-radius:5px;font-weight:700}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cdh{text-align:center;font-size:10px;font-weight:700;color:var(--mut);padding:4px 0}
.cdh.we{color:#F87171}
.cd{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;position:relative;font-size:13px;border:1px solid transparent}
.cd:hover{background:rgba(99,102,241,.12);transform:scale(1.03)}
.cd.td{border:2px solid var(--acc);background:rgba(99,102,241,.1);font-weight:800}
.cd.he{background:rgba(99,102,241,.06);border-color:var(--brd)}
.cd .ds{display:flex;gap:2px;margin-top:2px}
.cd .dt{width:5px;height:5px;border-radius:50%;animation:pulse 2.5s ease infinite}
.er{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:9px;background:var(--card2);margin-bottom:5px;transition:all .15s;border:1px solid transparent;animation:fadeIn .3s ease;font-size:13px}
.er:hover{border-color:var(--brd2)}
.ed{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);animation:fadeIn .15s ease}
.mdl{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:20px;width:400px;max-width:92vw;animation:scaleIn .2s ease;box-shadow:0 25px 60px rgba(0,0,0,.5)}
.mdl h3{font-size:16px;font-weight:700;margin-bottom:14px}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:11px;font-weight:600;color:var(--dim);margin-bottom:5px}
.acts{display:flex;gap:8px;margin-top:16px}
.acts .btn{flex:1;padding:9px}
.sc{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.sc button{padding:4px 10px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;border:none;background:var(--card2);color:var(--dim)}
.sc button.on{color:#fff}
.sc button:hover{filter:brightness(1.2)}
.aw{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,rgba(99,102,241,.15) 0%,transparent 60%),var(--bg)}
.ac{width:360px;max-width:90vw;padding:28px;border-radius:18px;background:var(--card);border:1px solid var(--brd);animation:scaleIn .3s ease;box-shadow:0 25px 60px rgba(0,0,0,.4)}
.ac h2{font-size:22px;font-weight:800;text-align:center;margin-bottom:3px}
.ac .sub{text-align:center;color:var(--dim);font-size:12px;margin-bottom:20px}
.ac .btn-p{width:100%;padding:11px;font-size:14px;margin-top:6px}
.ac .tg{text-align:center;margin-top:14px;font-size:12px;color:var(--dim)}
.ac .tg a{color:var(--accl);cursor:pointer;text-decoration:underline}
.aerr{background:rgba(239,68,68,.1);color:#F87171;padding:8px;border-radius:7px;font-size:12px;margin-bottom:10px;text-align:center}
.asuc{background:rgba(16,185,129,.1);color:#6EE7B7;padding:8px;border-radius:7px;font-size:12px;margin-bottom:10px;text-align:center}
.rq{padding:10px 12px;border-radius:9px;background:var(--card2);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:8px;animation:fadeIn .3s ease}
.rq .info{flex:1;font-size:13px}
.rq .info span{font-weight:600}
.rq .info small{color:var(--dim);font-size:11px}
.ut{width:100%;border-collapse:collapse;font-size:13px}
.ut th{text-align:left;font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;padding:8px 12px;border-bottom:1px solid var(--brd)}
.ut td{padding:8px 12px;border-bottom:1px solid rgba(148,163,184,.08)}
.gt{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:600;background:rgba(99,102,241,.15);color:var(--accl);margin:1px 3px 1px 0}
.empty{text-align:center;padding:30px 16px;color:var(--mut)}
.empty .ic{font-size:32px;margin-bottom:6px}
.empty p{font-size:12px}
@media(max-width:700px){.side{flex:1 1 100%}.layout{flex-direction:column}.cd{font-size:11px}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const S={page:'login',user:null,token:null,error:'',success:'',tab:'calendar',groups:[],myGroups:[],selectedGroup:null,exams:[],users:[],members:[],requests:[],myRequests:[],allRequests:[],calYear:new Date().getFullYear(),calMonth:new Date().getMonth(),modal:null,modalData:{},formSubject:'',formDate:'',formNote:'',formGroupName:'',formOldPw:'',formNewPw:'',assignUserId:null};
const ML=["Janvāris","Februāris","Marts","Aprīlis","Maijs","Jūnijs","Jūlijs","Augusts","Septembris","Oktobris","Novembris","Decembris"];
const DL=["P","O","T","C","Pk","S","Sv"];
const CL=[{d:"#6366F1"},{d:"#D97706"},{d:"#10B981"},{d:"#F43F5E"},{d:"#0EA5E9"},{d:"#22C55E"},{d:"#A855F7"},{d:"#F97316"},{d:"#8B5CF6"}];
const SB=["Matemātika","Latviešu valoda","Angļu valoda","Fizika","Ķīmija","Bioloģija","Vēsture","Ģeogrāfija","Informātika"];
function sc(s){const i=SB.indexOf(s);if(i>=0)return CL[i];let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h)+s.charCodeAt(i);return CL[Math.abs(h)%CL.length]}

async function api(p,o={}){
  const h={'Content-Type':'application/json'};
  if(S.token)h['Authorization']='Bearer '+S.token;
  const r=await fetch(p,{...o,headers:h});
  const d=await r.json();
  if(!r.ok)throw new Error(d.error||'Kļūda');
  return d;
}

function isSA(){return S.user?.role==='superadmin'}
function isGA(){return S.myGroups.some(g=>g.my_role==='admin')}
function isGAfor(gid){if(isSA())return true;const g=S.myGroups.find(g=>g.id===gid);return g?.my_role==='admin'}
function canManage(){return isSA()||isGA()}

async function login(u,p){try{const d=await api('/api/login',{method:'POST',body:JSON.stringify({username:u,password:p})});S.token=d.token;S.user=d.user;S.page='dashboard';S.error='';localStorage.setItem('token',d.token);await loadData();render()}catch(e){S.error=e.message;render()}}
async function register(u,p){try{await api('/api/register',{method:'POST',body:JSON.stringify({username:u,password:p})});S.error='';S.success='Reģistrācija veiksmīga! Tagad pieslēdzies.';S.page='login';render()}catch(e){S.error=e.message;render()}}
async function logout(){try{await api('/api/logout',{method:'POST'})}catch(e){}S.token=null;S.user=null;S.page='login';S.selectedGroup=null;localStorage.removeItem('token');render()}

async function changePw(){
  try{await api('/api/change-password',{method:'POST',body:JSON.stringify({oldPassword:S.formOldPw,newPassword:S.formNewPw})});S.modal=null;S.formOldPw='';S.formNewPw='';S.success='Parole nomainīta!';setTimeout(()=>{S.success='';render()},3000);render()}
  catch(e){S.error=e.message;render()}
}

async function loadData(){
  S.myGroups=await api('/api/my-groups');
  S.groups=await api('/api/groups');
  if(S.myGroups.length>0&&!S.selectedGroup)S.selectedGroup=S.myGroups[0]?.id||S.groups[0]?.id;
  if(S.selectedGroup){
    try{S.exams=await api(`/api/groups/${S.selectedGroup}/exams`)}catch(e){S.exams=[]}
    if(isGAfor(S.selectedGroup)){try{S.requests=await api(`/api/groups/${S.selectedGroup}/requests`)}catch(e){S.requests=[]}}
  }
  if(canManage()){try{S.allRequests=await api('/api/all-requests')}catch(e){S.allRequests=[]}}
  if(isSA()){S.users=await api('/api/users')}
  S.myRequests=await api('/api/my-requests');
}

async function selGroup(id){S.selectedGroup=id;try{S.exams=await api(`/api/groups/${id}/exams`)}catch(e){S.exams=[]}if(isGAfor(id)){try{S.requests=await api(`/api/groups/${id}/requests`)}catch(e){S.requests=[]}}else{S.requests=[]}render()}
async function addGroup(){if(!S.formGroupName.trim())return;await api('/api/groups',{method:'POST',body:JSON.stringify({name:S.formGroupName.trim()})});S.formGroupName='';S.modal=null;await loadData();render()}
async function delGroup(id){if(!confirm('Dzēst grupu un visus eksāmenus?'))return;await api(`/api/groups/${id}`,{method:'DELETE'});if(S.selectedGroup===id)S.selectedGroup=null;await loadData();render()}
async function addExam(){if(!S.formSubject.trim()||!S.formDate)return;await api(`/api/groups/${S.selectedGroup}/exams`,{method:'POST',body:JSON.stringify({subject:S.formSubject.trim(),exam_date:S.formDate,note:S.formNote.trim()})});S.modal=null;S.formSubject='';S.formDate='';S.formNote='';S.exams=await api(`/api/groups/${S.selectedGroup}/exams`);render()}
async function delExam(id){await api(`/api/exams/${id}`,{method:'DELETE'});S.exams=await api(`/api/groups/${S.selectedGroup}/exams`);render()}
async function joinGroup(gid){try{await api(`/api/groups/${gid}/join`,{method:'POST'});S.myRequests=await api('/api/my-requests');render()}catch(e){alert(e.message)}}
async function approveReq(id){await api(`/api/requests/${id}/approve`,{method:'POST'});await loadData();render()}
async function rejectReq(id){await api(`/api/requests/${id}/reject`,{method:'POST'});await loadData();render()}
async function setGA(gid,uid){await api(`/api/groups/${gid}/set-admin/${uid}`,{method:'POST'});await loadData();render()}
async function removeGA(gid,uid){await api(`/api/groups/${gid}/remove-admin/${uid}`,{method:'POST'});await loadData();render()}
async function removeMember(gid,uid){await api(`/api/groups/${gid}/members/${uid}`,{method:'DELETE'});await loadData();render()}
async function directAdd(gid,uid){await api(`/api/groups/${gid}/add-member/${uid}`,{method:'POST'});await loadData();render()}

function render(){
  const a=document.getElementById('app');
  if(S.page==='login'||S.page==='register'){a.innerHTML=rAuth(S.page);aAuth(S.page)}
  else{a.innerHTML=rDash();aDash()}
}

function rAuth(m){
  const isL=m==='login';
  return `<div class="aw"><div class="ac">
    <h2>📅 ${isL?'Pieslēgties':'Reģistrēties'}</h2>
    <p class="sub">Eksāmenu kalendāra sistēma</p>
    ${S.error?`<div class="aerr">${S.error}</div>`:''}
    ${S.success?`<div class="asuc">${S.success}</div>`:''}
    <div class="fld"><label>Lietotājvārds</label><input class="inp" id="au" placeholder="Lietotājvārds..." autocomplete="username"></div>
    <div class="fld"><label>Parole</label><input class="inp" id="ap" type="password" placeholder="Parole..." autocomplete="current-password"></div>
    <button class="btn btn-p" id="as">${isL?'Pieslēgties':'Reģistrēties'}</button>
    <div class="tg">${isL?'Nav konta? <a id="at">Reģistrēties</a>':'Jau ir konts? <a id="at">Pieslēgties</a>'}</div>
    ${isL?'<p style="text-align:center;margin-top:10px;font-size:10px;color:var(--mut)">Admin: admin / admin123</p>':''}
  </div></div>`;
}
function aAuth(m){
  const isL=m==='login';
  document.getElementById('as').onclick=()=>{const u=document.getElementById('au').value,p=document.getElementById('ap').value;isL?login(u,p):register(u,p)};
  document.getElementById('ap').onkeydown=e=>{if(e.key==='Enter')document.getElementById('as').click()};
  document.getElementById('at').onclick=()=>{S.page=isL?'register':'login';S.error='';S.success='';render()};
}

function rDash(){
  const sa=isSA(),ga=isGA(),cm=canManage();
  // Tabs for different roles
  let tabs='<button class="tab ${S.tab==="calendar"?"on":""}" data-t="calendar">📅 Kalendārs</button>';
  if(!sa)tabs+='<button class="tab ${S.tab==="browse"?"on":""}" data-t="browse">🔍 Grupas</button>';
  if(cm)tabs+=`<button class="tab ${S.tab==='requests'?'on':''}" data-t="requests">📨 Pieprasījumi${S.allRequests.length>0?' ('+S.allRequests.length+')':''}</button>`;
  if(sa)tabs+='<button class="tab ${S.tab==="users"?"on":""}" data-t="users">👥 Lietotāji</button>';
  tabs+='<button class="tab ${S.tab==="settings"?"on":""}" data-t="settings">⚙️ Iestatījumi</button>';
  // Fix template literals
  tabs=tabs.replace(/\$\{S\.tab==="(\w+)"\?"on":""\}/g,(m,t)=>S.tab===t?'on':'');
  tabs=tabs.replace(/\$\{S\.tab==='(\w+)'\?'on':''\}/g,(m,t)=>S.tab===t?'on':'');
  tabs=tabs.replace(/\$\{S\.allRequests\.length>0\?' \('+S\.allRequests\.length\+'\)':''\}/g, S.allRequests.length>0?' ('+S.allRequests.length+')':'');

  let content='';
  if(S.tab==='calendar')content=rCalTab();
  else if(S.tab==='browse')content=rBrowse();
  else if(S.tab==='requests')content=rRequests();
  else if(S.tab==='users')content=rUsers();
  else if(S.tab==='settings')content=rSettings();

  return `<div class="hdr">
    <h1>📅 Eksāmenu kalendārs</h1>
    <div class="ui">
      <span class="badge ${sa?'sa':ga?'ga':''}">${sa?'Galvenais admin':ga?'Grupas admin':'Lietotājs'}</span>
      <span style="font-weight:600">${S.user.username}</span>
      <button class="btn btn-lo btn-sm" id="blo">Iziet</button>
    </div>
  </div>
  <div class="cnt">
    ${S.success?`<div class="asuc" style="margin-bottom:14px">${S.success}</div>`:''}
    <div class="tabs">${tabs}</div>
    ${content}
  </div>
  ${S.modal?rModal():''}`;
}

function rCalTab(){
  const visG=isSA()?S.groups:S.myGroups;
  const canAdd=isGAfor(S.selectedGroup);
  return `<div class="layout">
    <div class="side"><div class="crd">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <h3 style="font-size:14px;font-weight:700;color:var(--accl)">Manas grupas</h3>
        ${isSA()?'<button class="btn btn-g btn-sm" id="bag">+ Jauna</button>':''}
      </div>
      ${visG.length===0?'<div class="empty"><div class="ic">📁</div><p>Nav grupu. Pievienojies grupai cilnē "Grupas".</p></div>'
        :`<div class="gl">${visG.map(g=>`<div class="gi ${S.selectedGroup===g.id?'on':''}" data-g="${g.id}">
          <span>${g.name}${g.my_role==='admin'?' 👑':''}</span>
          <div style="display:flex;gap:4px;align-items:center">
            <span class="gc">${S.selectedGroup===g.id?S.exams.length:'—'}</span>
            ${isSA()?`<button class="btn btn-d btn-sm" data-dg="${g.id}" style="padding:2px 5px;font-size:10px">×</button>`:''}
          </div></div>`).join('')}</div>`}
    </div></div>
    <div class="main">${S.selectedGroup?rCal(canAdd):'<div class="crd empty"><div class="ic">👈</div><p>Izvēlies grupu</p></div>'}</div>
  </div>`;
}

function rCal(canAdd){
  const y=S.calYear,m=S.calMonth,dim=new Date(y,m+1,0).getDate();
  let fd=new Date(y,m,1).getDay();fd=fd===0?6:fd-1;
  const now=new Date(),tk=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const ebd={};S.exams.forEach(e=>{if(!ebd[e.exam_date])ebd[e.exam_date]=[];ebd[e.exam_date].push(e)});
  let dh='';for(let i=0;i<fd;i++)dh+='<div></div>';
  for(let d=1;d<=dim;d++){
    const k=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const de=ebd[k]||[];const it=k===tk;const dow=(fd+d-1)%7;const wk=dow>=5;
    const dots=de.slice(0,3).map(e=>`<div class="dt" style="background:${sc(e.subject).d}"></div>`).join('');
    dh+=`<div class="cd ${it?'td':''} ${de.length?'he':''}" ${canAdd?`data-ae="${k}"`:''}style="color:${wk?'#F87171':'var(--txt)'}">
      <span style="font-weight:${it?800:500}">${d}</span>${dots?`<div class="ds">${dots}</div>`:''}
      ${de.length?`<span style="position:absolute;top:1px;right:4px;font-size:8px;font-weight:700;color:var(--accl)">${de.length}</span>`:''}</div>`;
  }
  const gn=S.groups.find(g=>g.id===S.selectedGroup)?.name||'';
  const el=S.exams.map(e=>{const c=sc(e.subject);const[ey,em,ed]=e.exam_date.split('-');const past=e.exam_date<tk;
    return `<div class="er" style="opacity:${past?.5:1}"><div class="ed" style="background:${c.d}"></div>
    <div style="flex:1"><div style="font-weight:600">${e.subject}</div>${e.note?`<div style="font-size:11px;color:var(--dim);margin-top:1px">${e.note}</div>`:''}</div>
    <span style="font-size:11px;color:var(--accl);font-weight:600">${ed}.${em}.${ey}</span>
    ${canAdd?`<button class="btn btn-d btn-sm" data-de="${e.id}">×</button>`:''}</div>`;
  }).join('');

  // Pending requests for this group (if admin)
  let reqHtml='';
  if(isGAfor(S.selectedGroup)&&S.requests.length>0){
    reqHtml=`<div class="crd"><h3 style="font-size:14px;font-weight:700;margin-bottom:10px;color:var(--warn)">📨 Pieprasījumi pievienoties (${S.requests.length})</h3>
    ${S.requests.map(r=>`<div class="rq"><div class="info"><span>${r.username}</span></div>
    <button class="btn btn-s btn-sm" data-ar="${r.id}">✓</button>
    <button class="btn btn-d btn-sm" data-rr="${r.id}">✗</button></div>`).join('')}</div>`;
  }

  return `<div class="crd">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:6px">
      <h3 style="font-size:16px;font-weight:700">${ML[m]} ${y} — <span style="color:var(--accl)">${gn}</span></h3>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="btn btn-g btn-sm" id="cp">‹</button>
        <button class="btn btn-g btn-sm" id="ct" style="font-size:10px">Šodien</button>
        <button class="btn btn-g btn-sm" id="cn">›</button>
      </div>
    </div>
    <div class="cg">${DL.map((d,i)=>`<div class="cdh ${i>=5?'we':''}">${d}</div>`).join('')}${dh}</div>
    ${canAdd?'<p style="text-align:center;margin-top:10px;font-size:11px;color:var(--mut)">Klikšķini uz datuma lai pievienotu eksāmenu</p>':''}
  </div>
  ${reqHtml}
  <div class="crd">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <h3 style="font-size:14px;font-weight:700">Eksāmenu saraksts</h3>
      ${canAdd?'<button class="btn btn-p btn-sm" id="bam">+ Pievienot</button>':''}
    </div>
    ${S.exams.length===0?'<div class="empty"><div class="ic">📝</div><p>Nav eksāmenu</p></div>':el}
  </div>`;
}

function rBrowse(){
  const myIds=S.myGroups.map(g=>g.id);
  const pendingIds=S.myRequests.filter(r=>r.status==='pending').map(r=>r.group_id);
  const available=S.groups.filter(g=>!myIds.includes(g.id));
  return `<div class="crd">
    <h3 style="font-size:15px;font-weight:700;margin-bottom:12px">Pieejamās grupas</h3>
    ${available.length===0?'<div class="empty"><div class="ic">✅</div><p>Tu jau esi visās grupās, vai nav pieejamu grupu</p></div>'
    :available.map(g=>{
      const isPending=pendingIds.includes(g.id);
      return `<div class="rq"><div class="info"><span>${g.name}</span></div>
      ${isPending?'<span style="font-size:11px;color:var(--warn);font-weight:600">Gaida apstiprinājumu...</span>'
      :`<button class="btn btn-p btn-sm" data-jg="${g.id}">Pievienoties</button>`}</div>`;
    }).join('')}
  </div>
  <div class="crd">
    <h3 style="font-size:15px;font-weight:700;margin-bottom:12px">Mani pieprasījumi</h3>
    ${S.myRequests.length===0?'<div class="empty"><p>Nav pieprasījumu</p></div>'
    :S.myRequests.map(r=>{
      const col=r.status==='pending'?'var(--warn)':r.status==='approved'?'var(--grn)':'var(--red)';
      const txt=r.status==='pending'?'Gaida':r.status==='approved'?'Apstiprināts':'Noraidīts';
      return `<div class="rq"><div class="info"><span>${r.group_name}</span></div>
      <span style="font-size:11px;color:${col};font-weight:600">${txt}</span></div>`;
    }).join('')}
  </div>`;
}

function rRequests(){
  return `<div class="crd">
    <h3 style="font-size:15px;font-weight:700;margin-bottom:12px">📨 Visi gaidošie pieprasījumi</h3>
    ${S.allRequests.length===0?'<div class="empty"><div class="ic">✅</div><p>Nav gaidošu pieprasījumu</p></div>'
    :S.allRequests.map(r=>`<div class="rq"><div class="info"><span>${r.username}</span> <small>→ ${r.group_name}</small></div>
    <button class="btn btn-s btn-sm" data-ar="${r.id}">✓ Apstiprināt</button>
    <button class="btn btn-d btn-sm" data-rr="${r.id}">✗ Noraidīt</button></div>`).join('')}
  </div>`;
}

function rUsers(){
  return `<div class="crd">
    <h3 style="font-size:15px;font-weight:700;margin-bottom:12px">Lietotāju pārvaldība</h3>
    <p style="font-size:11px;color:var(--dim);margin-bottom:12px">Izvēlies grupu lai pārvaldītu tās dalībniekus un adminus</p>
    <div class="sc">${S.groups.map(g=>`<button class="${S.modalData.manageGroup===g.id?'on':''}" data-mg="${g.id}" style="${S.modalData.manageGroup===g.id?'background:var(--acc)':''}">${g.name}</button>`).join('')}</div>
    ${S.modalData.manageGroup?rGroupMembers():'<div class="empty"><p>Izvēlies grupu augstāk</p></div>'}
  </div>
  <div class="crd">
    <h3 style="font-size:15px;font-weight:700;margin-bottom:12px">Visi lietotāji</h3>
    <table class="ut"><thead><tr><th>Lietotājs</th><th>Loma</th></tr></thead>
    <tbody>${S.users.map(u=>`<tr><td style="font-weight:600">${u.username}</td>
    <td><span class="badge ${u.role==='superadmin'?'sa':''}">${u.role==='superadmin'?'Galvenais admin':'Lietotājs'}</span></td></tr>`).join('')}</tbody></table>
  </div>`;
}

function rGroupMembers(){
  const gid=S.modalData.manageGroup;
  const gn=S.groups.find(g=>g.id===gid)?.name||'';
  const members=S.modalData.members||[];
  const nonMembers=S.users.filter(u=>!members.some(m=>m.id===u.id)&&u.role!=='superadmin');
  return `<div style="margin-top:12px">
    <h4 style="font-size:13px;font-weight:700;margin-bottom:8px;color:var(--accl)">${gn} — dalībnieki</h4>
    ${members.length===0?'<p style="font-size:12px;color:var(--dim)">Nav dalībnieku</p>'
    :members.map(m=>`<div class="rq"><div class="info"><span>${m.username}</span>
    <span class="badge ${m.group_role==='admin'?'ga':''}" style="margin-left:6px">${m.group_role==='admin'?'Grupas admin':'Dalībnieks'}</span></div>
    ${m.group_role==='admin'
      ?`<button class="btn btn-w btn-sm" data-rga="${gid}-${m.id}">Noņemt admin</button>`
      :`<button class="btn btn-s btn-sm" data-sga="${gid}-${m.id}">Padarīt admin</button>`}
    <button class="btn btn-d btn-sm" data-rmm="${gid}-${m.id}">Izņemt</button></div>`).join('')}
    ${nonMembers.length>0?`<div style="margin-top:10px"><p style="font-size:11px;color:var(--dim);margin-bottom:6px">Pievienot dalībnieku:</p>
    ${nonMembers.map(u=>`<button class="btn btn-g btn-sm" data-dam="${gid}-${u.id}" style="margin:2px">${u.username}</button>`).join('')}</div>`:''}
  </div>`;
}

function rSettings(){
  return `<div class="crd">
    <h3 style="font-size:15px;font-weight:700;margin-bottom:14px">⚙️ Iestatījumi</h3>
    <div style="max-width:320px">
      <div class="fld"><label>Pašreizējā parole</label><input class="inp" type="password" id="opw" placeholder="Vecā parole..."></div>
      <div class="fld"><label>Jaunā parole</label><input class="inp" type="password" id="npw" placeholder="Jaunā parole (min 4 simboli)..."></div>
      <button class="btn btn-p" id="bcpw">Nomainīt paroli</button>
      ${S.error?`<div class="aerr" style="margin-top:10px">${S.error}</div>`:''}
    </div>
  </div>`;
}

function rModal(){
  if(S.modal==='addGroup'){
    return `<div class="mbg" id="mbg"><div class="mdl"><h3>Jauna grupa</h3>
    <div class="fld"><label>Nosaukums</label><input class="inp" id="mgn" placeholder="Piem.: 12.a klase" value="${S.formGroupName}"></div>
    <div class="acts"><button class="btn btn-g" id="mc">Atcelt</button><button class="btn btn-p" id="mok">Pievienot</button></div></div></div>`;
  }
  if(S.modal==='addExam'){
    const chips=SB.map(s=>{const c=sc(s);const on=S.formSubject===s;return `<button class="sc-btn ${on?'on':''}" data-sb="${s}" style="${on?'background:'+c.d+';color:#fff':''}">${s}</button>`}).join('');
    return `<div class="mbg" id="mbg"><div class="mdl"><h3>Pievienot eksāmenu</h3>
    <p style="color:var(--accl);font-size:12px;font-weight:600;margin-bottom:12px">${S.modalData.df||''}</p>
    <div class="fld"><label>Priekšmets</label><div class="sc">${chips}</div></div>
    <div class="fld"><label>Vai ieraksti citu</label><input class="inp" id="msb" placeholder="Priekšmets..." value="${S.formSubject}"></div>
    <div class="fld"><label>Datums</label><input class="inp" id="mdt" type="date" value="${S.formDate}"></div>
    <div class="fld"><label>Piezīmes</label><input class="inp" id="mnt" placeholder="10:00, 205.kab." value="${S.formNote}"></div>
    <div class="acts"><button class="btn btn-g" id="mc">Atcelt</button><button class="btn btn-p" id="mok">Pievienot</button></div></div></div>`;
  }
  return '';
}

function aDash(){
  document.getElementById('blo')?.addEventListener('click',logout);
  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{S.tab=t.dataset.t;S.error='';render()}));

  // Groups
  document.querySelectorAll('[data-g]').forEach(el=>el.addEventListener('click',e=>{if(e.target.dataset.dg)return;selGroup(parseInt(el.dataset.g))}));
  document.querySelectorAll('[data-dg]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();delGroup(parseInt(el.dataset.dg))}));
  document.getElementById('bag')?.addEventListener('click',()=>{S.modal='addGroup';S.formGroupName='';render()});

  // Calendar
  document.getElementById('cp')?.addEventListener('click',()=>{if(S.calMonth===0){S.calMonth=11;S.calYear--}else S.calMonth--;render()});
  document.getElementById('cn')?.addEventListener('click',()=>{if(S.calMonth===11){S.calMonth=0;S.calYear++}else S.calMonth++;render()});
  document.getElementById('ct')?.addEventListener('click',()=>{S.calMonth=new Date().getMonth();S.calYear=new Date().getFullYear();render()});

  // Add exam
  document.querySelectorAll('[data-ae]').forEach(el=>el.addEventListener('click',()=>{
    const d=el.dataset.ae;const[y,m,day]=d.split('-');S.formDate=d;S.formSubject='';S.formNote='';S.modalData={df:`${day}.${m}.${y}`};S.modal='addExam';render()}));
  document.getElementById('bam')?.addEventListener('click',()=>{S.formDate='';S.formSubject='';S.formNote='';S.modalData={};S.modal='addExam';render()});
  document.querySelectorAll('[data-de]').forEach(el=>el.addEventListener('click',()=>delExam(parseInt(el.dataset.de))));

  // Join group
  document.querySelectorAll('[data-jg]').forEach(el=>el.addEventListener('click',()=>joinGroup(parseInt(el.dataset.jg))));

  // Approve/reject
  document.querySelectorAll('[data-ar]').forEach(el=>el.addEventListener('click',()=>approveReq(parseInt(el.dataset.ar))));
  document.querySelectorAll('[data-rr]').forEach(el=>el.addEventListener('click',()=>rejectReq(parseInt(el.dataset.rr))));

  // Manage groups (users tab)
  document.querySelectorAll('[data-mg]').forEach(el=>el.addEventListener('click',async()=>{
    const gid=parseInt(el.dataset.mg);S.modalData.manageGroup=gid;
    try{S.modalData.members=await api(`/api/groups/${gid}/members`)}catch(e){S.modalData.members=[]}
    render();
  }));
  document.querySelectorAll('[data-sga]').forEach(el=>el.addEventListener('click',()=>{const[g,u]=el.dataset.sga.split('-').map(Number);setGA(g,u)}));
  document.querySelectorAll('[data-rga]').forEach(el=>el.addEventListener('click',()=>{const[g,u]=el.dataset.rga.split('-').map(Number);removeGA(g,u)}));
  document.querySelectorAll('[data-rmm]').forEach(el=>el.addEventListener('click',()=>{const[g,u]=el.dataset.rmm.split('-').map(Number);removeMember(g,u)}));
  document.querySelectorAll('[data-dam]').forEach(el=>el.addEventListener('click',()=>{const[g,u]=el.dataset.dam.split('-').map(Number);directAdd(g,u)}));

  // Settings
  document.getElementById('bcpw')?.addEventListener('click',()=>{S.formOldPw=document.getElementById('opw')?.value||'';S.formNewPw=document.getElementById('npw')?.value||'';changePw()});

  // Modal
  document.getElementById('mbg')?.addEventListener('click',e=>{if(e.target.id==='mbg'){S.modal=null;render()}});
  document.getElementById('mc')?.addEventListener('click',()=>{S.modal=null;render()});
  if(S.modal==='addGroup'){
    const i=document.getElementById('mgn');i?.focus();i?.addEventListener('input',e=>S.formGroupName=e.target.value);
    i?.addEventListener('keydown',e=>{if(e.key==='Enter')addGroup()});
    document.getElementById('mok')?.addEventListener('click',addGroup);
  }
  if(S.modal==='addExam'){
    document.querySelectorAll('[data-sb]').forEach(el=>el.addEventListener('click',()=>{S.formSubject=el.dataset.sb;const i=document.getElementById('msb');if(i)i.value=S.formSubject;render()}));
    document.getElementById('msb')?.addEventListener('input',e=>S.formSubject=e.target.value);
    document.getElementById('mdt')?.addEventListener('input',e=>S.formDate=e.target.value);
    document.getElementById('mnt')?.addEventListener('input',e=>S.formNote=e.target.value);
    document.getElementById('mok')?.addEventListener('click',addExam);
  }
}

async function init(){
  const t=localStorage.getItem('token');
  if(t){S.token=t;try{const d=await api('/api/me');S.user=d.user;S.page='dashboard';await loadData()}catch(e){localStorage.removeItem('token');S.token=null}}
  render();
}
init();
</script>
</body>
</html>
